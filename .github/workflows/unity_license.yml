name: Build App windows
 
on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:  # PR作成・更新時に自動実行
    branches: [ main ]
 
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
 
defaults:
  run:
    shell: powershell -ExecutionPolicy Bypass -Command ". '{0}'"
 
jobs:
  buildForWindowsBasedPlatforms:
    name: Build for StandaloneWindows64
    runs-on: [ self-hosted, Windows ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          clean: false
 
      - name: Clean Old Logs
        run: |
          $files = "unity_build.log", "error_summary.txt"
          foreach ($f in $files) { if (Test-Path $f) { Remove-Item $f -Force } }
 
      - name: Code Style Check
        run: |
          $OutputEncoding = [System.Text.Encoding]::UTF8
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $errorSummaryPath = "$env:GITHUB_WORKSPACE\error_summary.txt"

          Write-Host "🔍 プロジェクトファイルを検索中..."
          Write-Host "📁 ワークスペース: $env:GITHUB_WORKSPACE"

          $workspaceFile = Get-ChildItem -Path "$env:GITHUB_WORKSPACE" -Filter "Assembly-CSharp.csproj" -Recurse | Select-Object -First 1
          if ($null -eq $workspaceFile) {
              Write-Host "⏭️  Assembly-CSharp.csproj が見つかりません。スキップしています。"
              exit 0
          }

          Write-Host "✓ 見つかりました: $($workspaceFile.FullName)"
          Write-Host "📋 コード命名規則をチェック中..."
          Write-Host ""

          # dotnet format を実行
          Write-Host "▶️  実行: dotnet format style --severity warn --verify-no-changes"
          & dotnet format style "$($workspaceFile.FullName)" --severity warn --verify-no-changes --exclude "Assets\TutorialInfo" | Tee-Object -Variable formatOutput | Out-Host
          $formatExitCode = $LASTEXITCODE

          Write-Host ""
          Write-Host "=== 実行結果 ==="
          Write-Host "終了コード: $formatExitCode"
          Write-Host "出力行数: $($formatOutput.Count)"
          Write-Host "=== 終了 ==="
          Write-Host ""

          if ($formatExitCode -ne 0) {
              Write-Host "⚠️  >>> 命名規則違反が検出されました <<<"

              # 複数パターンで違反を抽出
              $violations = @()

              # パターン1: ファイル(行,列) warning IDExxx: メッセージ
              $violations += @($formatOutput |
                  Where-Object { $_ -match "warning IDE\d+" } |
                  ForEach-Object {
                      if ($_ -match "^([^:]+)\((\d+),(\d+)\):\s*warning (IDE\d+):\s*(.+)$") {
                          $file = Split-Path $Matches[1] -Leaf
                          "$file (Line $($Matches[2]), Col $($Matches[3])): [$($Matches[4])] $($Matches[5])"
                      } elseif ($_ -match "([^\\]+\.cs)\((\d+),\d+\).*?(IDE\d+):\s*(.+)$") {
                          "$($Matches[1]) (Line $($Matches[2])): [$($Matches[3])] $($Matches[4])"
                      } else {
                          $_
                      }
                  })

              # パターン2: 警告を含むすべての行
              if ($violations.Count -eq 0) {
                  $violations += @($formatOutput | Where-Object { $_ -match "warning|error" })
              }

              # 重複除去
              $violations = @($violations | Select-Object -Unique)
              $violationCount = $violations.Count

              Write-Host "📊 違反件数: $violationCount"
              Write-Host ""

              if ($violationCount -gt 0) {
                  $displayViolations = $violations | Select-Object -First 25
                  $content = "❌ 命名規則違反が見つかりました ($violationCount 件):`n`n" + ($displayViolations -join "`n")
                  if ($violationCount -gt 25) {
                      $content += "`n`n... ほか $($violationCount - 25) 件の違反"
                  }
                  Write-Host "✓ 違反情報を収集しました"
              } else {
                  # 万が一パースできない場合は生ログを貼る
                  $rawLines = @($formatOutput | Where-Object { $_.Length -gt 0 })
                  $content = "命名規則違反が検出されました (詳細は GitHub ログを参照):`n`n" + (($rawLines | Select-Object -Last 30) -join "`n")
                  Write-Host "⚠️  違反情報をパースできませんでした"
              }

              Write-Host ""
              Write-Host "💾 ファイルを保存中..."
              Write-Host "　 保存先: $errorSummaryPath"

              # UTF-8 BOM なし で保存
              $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
              [System.IO.File]::WriteAllText($errorSummaryPath, $content, $utf8NoBom)

              Start-Sleep -Milliseconds 500

              if (Test-Path $errorSummaryPath) {
                  $fileSize = (Get-Item $errorSummaryPath).Length
                  Write-Host "✓ ファイルを作成しました (サイズ: $fileSize bytes)"
                  Write-Host ""
                  Write-Host "=== ファイル内容プレビュー ==="
                  Get-Content $errorSummaryPath -Encoding UTF8 | Write-Host
                  Write-Host "=== プレビュー終了 ==="
              } else {
                  Write-Host "✗ ファイル作成に失敗しました"
              }

              exit 1
          }

          Write-Host "✅ コード命名規則チェック: 成功!"
 
      - name: Run Build
        run: |
          $errorSummaryPath = "$env:GITHUB_WORKSPACE\error_summary.txt"
          Write-Host "🏗️  ビルド処理を開始しています..."
          $assetsPath = Get-ChildItem -Path "$env:GITHUB_WORKSPACE" -Filter "Assets" -Recurse -Directory | Select-Object -First 1
          if ($null -eq $assetsPath) { Write-Error "❌ Assetsフォルダが見つかりません!"; exit 1 }
          $projectRoot = $assetsPath.Parent.FullName
          $unityExe = "C:\Program Files\Unity\Hub\Editor\6000.3.1f1\Editor\Unity.exe"
          $logFile = "$env:GITHUB_WORKSPACE\unity_build.log"

          Get-Process -Name "Unity" -ErrorAction SilentlyContinue | Stop-Process -Force

          $proc = Start-Process -FilePath "$unityExe" -ArgumentList "-batchmode", "-nographics", "-quit", "-projectPath `"$projectRoot`"", "-buildTarget", "StandaloneWindows64", "-executeMethod", "BuildApp.Build", "-logFile `"$logFile`"" -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
              Write-Host "❌ ビルドが失敗しました"
              if (Test-Path $logFile) {
                  Get-Content $logFile -Tail 50 | Out-File -FilePath $errorSummaryPath -Encoding utf8
              } else {
                  "Unity プロセスがすぐにクラッシュしました。" | Out-File -FilePath $errorSummaryPath -Encoding utf8
              }
              exit 1
          }
          Write-Host "✅ ビルド成功!"
 
      - name: Upload App
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: App_Develop
          path: "**/Builds/App/*"
          retention-days: 7
 
      - name: Discord Notification
        if: always()
        run: |
          $OutputEncoding = [System.Text.Encoding]::UTF8
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8

          $status = "${{ job.status }}"
          $color = if ($status -eq "success") { 3066993 } else { 15158332 }
          $statusTag = if ($status -eq "success") { "✅ 成功" } else { "❌ 失敗" }

          Write-Host ""
          Write-Host "=========================================="
          Write-Host "📤 Discord通知を送信準備中..."
          Write-Host "=========================================="
          Write-Host ""

          $errorSummaryPath = "$env:GITHUB_WORKSPACE\error_summary.txt"
          Write-Host "🔍 error_summary.txt を検索中..."
          Write-Host "　 パス: $errorSummaryPath"
          Write-Host "　 存在確認: $(Test-Path $errorSummaryPath)"

          Write-Host ""
          Write-Host "📂 ワークスペース内の .txt ファイル:"
          Get-ChildItem "$env:GITHUB_WORKSPACE" -Filter "*.txt" -ErrorAction SilentlyContinue | ForEach-Object {
              Write-Host "　 - $($_.Name) ($(($_.Length)) bytes)"
          }
          Write-Host ""

          $summaryContent = "GitHub ログを確認してください"
          if (Test-Path $errorSummaryPath) {
              Write-Host "✓ error_summary.txt が見つかりました"
              $rawContent = Get-Content $errorSummaryPath -Raw -Encoding UTF8
              $summaryContent = $rawContent.Trim()
              Write-Host "　 ファイルサイズ: $($rawContent.Length) 文字"
              Write-Host "　 内容プレビュー:"
              Write-Host "　 $(($summaryContent.Split("`n") | Select-Object -First 3) -join "`n　 ")"
              Write-Host ""
              if ($summaryContent.Length -gt 2000) {
                  Write-Host "⚠️  内容が2000文字を超えています。カットしています。"
                  $summaryContent = $summaryContent.Substring(0, 2000) + "..."
              }
          } else {
              Write-Host "✗ error_summary.txt が見つかりません"
              Write-Host "　 このファイルが作成されていない可能性があります。"
          }
          Write-Host ""

          $finalSummary = '```' + "`n" + $summaryContent + "`n" + '```'
          Write-Host "📝 Discord メッセージを作成中..."
 
          $payload = @{
              embeds = @(@{
                  title = "🎮 Unity CI Monitor (PeersGame)"
                  description = "**$statusTag**"
                  color = [int]$color
                  author = @{ name = "トリガー: ${{ github.actor }}" }
                  fields = @(
                      @{ name = "📊 分析結果"; value = $finalSummary; inline = $false },
                      @{ name = "🔗 詳細"; value = "[ログを確認](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"; inline = $false }
                  )
              })
          }
 
          Write-Host ""
          Write-Host "📦 JSON ペイロードを作成中..."
          $json = $payload | ConvertTo-Json -Depth 5

          $jsonFilePath = "$env:TEMP\discord_payload.json"
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllText($jsonFilePath, $json, $utf8NoBom)

          Write-Host "✓ JSON ファイルを作成しました"
          Write-Host "　 パス: $jsonFilePath"
          Write-Host "　 サイズ: $((Get-Item $jsonFilePath).Length) bytes"
          Write-Host ""
          Write-Host "🚀 Discord に送信中..."

          $response = curl.exe -X POST -H "Content-Type: application/json" -d "@$jsonFilePath" "${{ secrets.DISCORD_WEBHOOK_URL }}" 2>&1
          $curlExitCode = $LASTEXITCODE

          Write-Host ""
          Write-Host "=========================================="
          if ($curlExitCode -eq 0) {
              Write-Host "✅ Discord 通知を送信しました"
          } else {
              Write-Host "⚠️  Discord 送信時にエラーが発生しました"
              Write-Host "　 終了コード: $curlExitCode"
              Write-Host "　 レスポンス: $response"
          }
          Write-Host "=========================================="