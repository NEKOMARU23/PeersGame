name: Build App windows

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    shell: powershell -ExecutionPolicy Bypass -Command ". '{0}'"

jobs:
  buildForWindowsBasedPlatforms:
    name: Build for StandaloneWindows64
    runs-on: [ self-hosted, Windows ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          clean: false

      - name: Clean Old Logs
        run: |
          $files = "unity_build.log", "error_summary.txt"
          foreach ($f in $files) { if (Test-Path $f) { Remove-Item $f -Force } }

      - name: Code Style Check
        continue-on-error: true
        run: |
          $OutputEncoding = [System.Text.Encoding]::UTF8
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $ErrorActionPreference = "Continue"
          $errorSummaryPath = "$env:GITHUB_WORKSPACE\error_summary.txt"

          Write-Host "Searching for project file..."
          Write-Host "Workspace: $env:GITHUB_WORKSPACE"

          $workspaceFile = Get-ChildItem -Path "$env:GITHUB_WORKSPACE" -Filter "Assembly-CSharp.csproj" -Recurse | Select-Object -First 1
          if ($null -eq $workspaceFile) {
              Write-Host "Assembly-CSharp.csproj not found. Skipping dotnet format."
              exit 0
          }

          Write-Host "Found: $($workspaceFile.FullName)"
          Write-Host "Checking Code Style (Naming Conventions)..."
          Write-Host ""

          Write-Host "Running: dotnet format style --severity warn --verify-no-changes"
          $formatOutput = @()
          & dotnet format style "$($workspaceFile.FullName)" --severity warn --verify-no-changes --exclude "Assets\TutorialInfo" 2>&1 | ForEach-Object {
              $formatOutput += $_
              Write-Host $_
          }
          $formatExitCode = $LASTEXITCODE

          Write-Host ""
          Write-Host "Exit Code: $formatExitCode"
          Write-Host "Output Lines: $($formatOutput.Count)"
          Write-Host ""

          if ($formatExitCode -ne 0) {
              Write-Host "=== CODE STYLE VIOLATIONS DETECTED ==="
              Write-Host ""

              Write-Host "DEBUG: Analyzing output..."
              Write-Host "Total lines: $($formatOutput.Count)"

              $warningLines = @($formatOutput | Where-Object { $_ -match "warning IDE\d+" })
              Write-Host "Warning lines found: $($warningLines.Count)"
              Write-Host ""

              if ($warningLines.Count -gt 0) {
                  Write-Host "Warning Details:"
                  foreach ($wl in $warningLines) {
                      Write-Host "  $wl"
                  }
                  Write-Host ""
              }

              $violations = @($warningLines | ForEach-Object {
                  $currentLine = $_
                  if ($currentLine -match "([^:]+\.cs)\((\d+),(\d+)\):\s*warning\s+(IDE\d+):\s*(.+)$") {
                      $filePath = $Matches[1]
                      $file = Split-Path $filePath -Leaf
                      $line = $Matches[2]
                      $col = $Matches[3]
                      $code = $Matches[4]
                      $message = $Matches[5]
                      $result = "$file (line $line, col $col): [$code] $message"
                      Write-Host "Match: $result"
                      $result
                  } else {
                      Write-Host "No match: $currentLine"
                      $currentLine
                  }
              })

              $violations = @($violations | Select-Object -Unique)
              $violationCount = $violations.Count

              Write-Host ""
              Write-Host "Total violations: $violationCount"
              Write-Host ""

              if ($violationCount -gt 0) {
                  $displayViolations = $violations | Select-Object -First 25
                  $content = "Naming Convention Violations ($violationCount found):`n`n" + ($displayViolations -join "`n")
                  if ($violationCount -gt 25) {
                      $content += "`n`nAnd $($violationCount - 25) more violations"
                  }
                  Write-Host "Violations collected"
              } else {
                  $rawLines = @($formatOutput | Where-Object { $_.Length -gt 0 })
                  $content = "Naming convention violations detected (see logs for details):`n`n" + (($rawLines | Select-Object -Last 30) -join "`n")
                  Write-Host "Unable to parse violation details"
              }

              Write-Host ""
              Write-Host "Saving to: $errorSummaryPath"

              try {
                  $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
                  [System.IO.File]::WriteAllText($errorSummaryPath, $content, $utf8NoBom)
                  Write-Host "File saved successfully"

                  Start-Sleep -Milliseconds 500

                  if (Test-Path $errorSummaryPath) {
                      $fileSize = (Get-Item $errorSummaryPath).Length
                      Write-Host "File size: $fileSize bytes"
                      Write-Host ""
                      Write-Host "=== FILE CONTENT PREVIEW ==="
                      Get-Content $errorSummaryPath -Raw -Encoding UTF8 | Write-Host
                      Write-Host "=== END PREVIEW ==="
                  } else {
                      Write-Host "ERROR: File verification failed"
                  }
              } catch {
                  Write-Host "ERROR: File save failed: $_"
              }

              Write-Host ""
              exit 1
          }

          Write-Host "Code style check passed!"

      - name: Run Build
        continue-on-error: true
        run: |
          $errorSummaryPath = "$env:GITHUB_WORKSPACE\error_summary.txt"
          Write-Host "Starting build..."
          $assetsPath = Get-ChildItem -Path "$env:GITHUB_WORKSPACE" -Filter "Assets" -Recurse -Directory | Select-Object -First 1
          if ($null -eq $assetsPath) { Write-Error "Assets folder not found"; exit 1 }
          $projectRoot = $assetsPath.Parent.FullName
          $unityExe = "C:\Program Files\Unity\Hub\Editor\6000.3.1f1\Editor\Unity.exe"
          $logFile = "$env:GITHUB_WORKSPACE\unity_build.log"

          Get-Process -Name "Unity" -ErrorAction SilentlyContinue | Stop-Process -Force

          $proc = Start-Process -FilePath "$unityExe" -ArgumentList "-batchmode", "-nographics", "-quit", "-projectPath `"$projectRoot`"", "-buildTarget", "StandaloneWindows64", "-executeMethod", "BuildApp.Build", "-logFile `"$logFile`"" -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
              Write-Host "Build failed"
              if (Test-Path $logFile) {
                  Get-Content $logFile -Tail 50 | Out-File -FilePath $errorSummaryPath -Encoding utf8
              } else {
                  "Unity process crashed immediately" | Out-File -FilePath $errorSummaryPath -Encoding utf8
              }
              exit 1
          }
          Write-Host "Build successful!"

      - name: Upload App
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: App_Develop
          path: "**/Builds/App/*"
          retention-days: 7

      - name: Discord Notification
        if: always()
        run: |
          $status = "${{ job.status }}"
          $color = if ($status -eq "success") { 3066993 } else { 15158332 }
          $statusTag = if ($status -eq "success") { "SUCCESS" } else { "FAILURE" }

          $errorSummaryPath = "$env:GITHUB_WORKSPACE\error_summary.txt"
          Write-Host "Checking for error_summary.txt..."

          $summaryContent = "See GitHub Logs"
          if (Test-Path $errorSummaryPath) {
              Write-Host "Found error_summary.txt"
              $rawContent = Get-Content $errorSummaryPath -Raw -Encoding UTF8
              $summaryContent = $rawContent.Trim()
              if ($summaryContent.Length -gt 2000) {
                  $summaryContent = $summaryContent.Substring(0, 2000) + "..."
              }
          }

          $finalSummary = '```' + "`n" + $summaryContent + "`n" + '```'

          $payload = @{
              embeds = @(@{
                  title = "Unity CI Monitor (PeersGame)"
                  description = "**$statusTag**"
                  color = [int]$color
                  author = @{ name = "Triggered by: ${{ github.actor }}" }
                  fields = @(
                      @{ name = "Analysis"; value = $finalSummary; inline = $false },
                      @{ name = "Details"; value = "[View Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"; inline = $false }
                  )
              })
          }

          $json = $payload | ConvertTo-Json -Depth 5

          $jsonFilePath = "$env:TEMP\discord_payload.json"
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllText($jsonFilePath, $json, $utf8NoBom)

          Write-Host "Sending to Discord..."

          $webhookUrl = "${{ secrets.DISCORD_WEBHOOK_URL }}"
          if ([string]::IsNullOrEmpty($webhookUrl)) {
              Write-Host "ERROR: DISCORD_WEBHOOK_URL not set"
              exit 0
          }

          $response = curl.exe -X POST -H "Content-Type: application/json" -d "@$jsonFilePath" "$webhookUrl" 2>&1
          $curlExitCode = $LASTEXITCODE

          if ($curlExitCode -eq 0) {
              Write-Host "Discord notification sent successfully"
          } else {
              Write-Host "Failed to send Discord notification: $response"
          }
