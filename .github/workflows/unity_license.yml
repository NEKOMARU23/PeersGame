name: Build App windows

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    shell: powershell -ExecutionPolicy Bypass -Command ". '{0}'"

jobs:
  buildForWindowsBasedPlatforms:
    name: Build for StandaloneWindows64
    runs-on: [ self-hosted, Windows ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          clean: false

      - name: Clean Old Logs
        run: |
          $files = "unity_build.log", "error_summary.txt"
          foreach ($f in $files) { if (Test-Path $f) { Remove-Item $f -Force } }

      - name: Run Build
        run: |
          # Assetsフォルダを基準にプロジェクトルートを自動特定
          $assetsPath = Get-ChildItem -Path "$env:GITHUB_WORKSPACE" -Filter "Assets" -Recurse -Directory | Select-Object -First 1
          if ($null -eq $assetsPath) { 
              Write-Error "Assets folder NOT FOUND!"
              exit 1 
          }
          $projectRoot = $assetsPath.Parent.FullName
          
          $unityExe = "C:\Program Files\Unity\Hub\Editor\6000.3.1f1\Editor\Unity.exe"
          $logFile = "$env:GITHUB_WORKSPACE\unity_build.log"

          Write-Host "Detected Project Root: $projectRoot"

          # ゾンビプロセスの強制終了
          Get-Process -Name "Unity" -ErrorAction SilentlyContinue | Stop-Process -Force

          Write-Host "Launching Unity Build..."
          $proc = Start-Process -FilePath "$unityExe" -ArgumentList "-batchmode", "-nographics", "-quit", "-projectPath `"$projectRoot`"", "-buildTarget", "StandaloneWindows64", "-executeMethod", "BuildApp.Build", "-logFile `"$logFile`"" -Wait -PassThru
          
          if ($proc.ExitCode -ne 0) {
              if (Test-Path $logFile) {
                  Get-Content $logFile -Tail 50 | Out-File -FilePath "error_summary.txt" -Encoding utf8
              } else {
                  "Unity process crashed instantly. Check Service Logon User (nekos)." | Out-File -FilePath "error_summary.txt" -Encoding utf8
              }
              exit 1
          }

      - name: Upload App
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: App_Develop
          path: "**/Builds/App/*"
          retention-days: 7

      - name: Discord Notification
        if: always()
        run: |
          $OutputEncoding = [System.Text.Encoding]::UTF8
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8

          $status = "${{ job.status }}"
          $color = if ($status -eq "success") { 3066993 } else { 15158332 }
          $statusTag = if ($status -eq "success") { "✅ SUCCESS" } else { "❌ FAILURE" }
          
          $summary = "Check GitHub Logs"
          if (Test-Path "error_summary.txt") { 
              $summary = (Get-Content "error_summary.txt" -Raw -Encoding utf8).Trim()
              if ($summary.Length -gt 800) { $summary = $summary.Substring(0, 800) + "..." }
              $summary = $summary -replace '"', '\"' -replace '\\', '\\' -replace "`n", " " -replace "`r", ""
          }

          # YAML構文エラーを避けるため、1行のJSON文字列として構築
          $json = '{"embeds": [{"title": "Unity CI Monitor (PeersGame)", "description": "**' + $statusTag + '**", "color": ' + $color + ', "author": {"name": "Triggered by: ${{ github.actor }}"}, "fields": [{"name": "Analysis", "value": "
http://googleusercontent.com/immersive_entry_chip/0

### ✅ 修正内容の解説
* **ヒアドキュメント (`@"..."@`) の廃止**: YAMLのインデントルールと干渉して `Invalid workflow file` を引き起こしていたため、単純な文字列連結 (`'...' + $var + '...'`) に変更しました。
* **改行コードの除去**: `$summary` 内に改行が含まれているとJSONが壊れる可能性があるため、通知用データから改行を消去する処理を追加しました。

これでリポジトリへの `push` が正常に受け付けられるようになります！そのまま更新して実行してみてください。
