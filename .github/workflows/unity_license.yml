name: Build App windows

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    shell: powershell -ExecutionPolicy Bypass -Command ". '{0}'"

jobs:
  buildForWindowsBasedPlatforms:
    name: Build for StandaloneWindows64
    runs-on: [ self-hosted, Windows ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          clean: false

      - name: Clean Old Logs
        run: |
          $files = "unity_build.log", "error_summary.txt"
          foreach ($f in $files) { if (Test-Path $f) { Remove-Item $f -Force } }

      - name: Auto Format & Check Style
        run: |
          $OutputEncoding = [System.Text.Encoding]::UTF8
          # dotnet format を使用して最低限の整形を行う
          dotnet format whitespace PeersGame --folder
          Write-Host "Code style checked for PeersGame."

      - name: Run Build
        run: |
          # フォルダ構成が3重にならないよう、Assetsがある直近の親を指定
          $projectRoot = "$env:GITHUB_WORKSPACE\PeersGame"
          $unityExe = "C:\Program Files\Unity\Hub\Editor\6000.3.1f1\Editor\Unity.exe"
          $logFile = "$env:GITHUB_WORKSPACE\unity_build.log"

          Write-Host "Project Root: $projectRoot"

          # ゾンビプロセスの強制終了
          Get-Process -Name "Unity" -ErrorAction SilentlyContinue | Stop-Process -Force

          Write-Host "Launching Unity Build..."
          # ライセンスエラー対策として -batchmode で実行（サービスは nekos ユーザーで動いている前提）
          $proc = Start-Process -FilePath "$unityExe" -ArgumentList "-batchmode", "-nographics", "-quit", "-projectPath `"$projectRoot`"", "-buildTarget", "StandaloneWindows64", "-executeMethod", "BuildApp.Build", "-logFile `"$logFile`"" -Wait -PassThru
          
          $exitCode = $proc.ExitCode
          Write-Host "Unity Exit Code: $exitCode"

          if ($exitCode -ne 0) {
              if (Test-Path $logFile) {
                  # Discordの文字数制限対策で最後30行程度を抽出
                  $logContent = Get-Content $logFile -Tail 30
                  $logContent | Out-File -FilePath "error_summary.txt" -Encoding utf8
              } else {
                  "Unity process crashed instantly. Check Service Logon User (nekos)." | Out-File -FilePath "error_summary.txt" -Encoding utf8
              }
              exit 1
          }

      - name: Upload App
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: App_Develop
          path: "PeersGame/Builds/App/*"
          retention-days: 7

      - name: Discord Notification
        if: always()
        run: |
          $OutputEncoding = [System.Text.Encoding]::UTF8
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8

          $status = "${{ job.status }}"
          $color = if ($status -eq "success") { 3066993 } else { 15158332 }
          $statusTag = if ($status -eq "success") { "✅ SUCCESS" } else { "❌ FAILURE" }
          
          $errorSummary = "No specific error logs found. Check GitHub Actions console."
          if (Test-Path "error_summary.txt") { 
              $errorSummary = (Get-Content "error_summary.txt" -Raw -Encoding utf8).Trim()
              # Discord通知用にバッククォートで囲む（長すぎる場合はカット）
              if ($errorSummary.Length -gt 800) { $errorSummary = $errorSummary.Substring(0, 800) + "..." }
          }

          # Discord APIが受け付ける正しいJSON構造を構築
          $embed = @{
            title = "Unity CI Monitor (PeersGame)"
            description = "**$statusTag**"
            color = [int]$color
            author = @{ name = "Triggered by: ${{ github.actor }}" }
            fields = @(
              @{ name = "Analysis"; value = "```$errorSummary```"; inline = $false },
              @{ name = "Details"; value = "[View Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"; inline = $false }
            )
          }

          # 要素1つの配列としてシリアライズするためにカンマ(,)を使用
          $payload = @{ embeds = ,$embed }
          $json = $payload | ConvertTo-Json -Depth 5 -Compress

          $bytes = [System.Text.Encoding]::UTF8.GetBytes($json)
          Invoke-RestMethod -Uri "${{ secrets.DISCORD_WEBHOOK_URL }}" -Method Post -Body $bytes -ContentType "application/json; charset=utf-8"
