name: Build App windows
 
on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:  # PR作成・更新時に自動実行
    branches: [ main ]
 
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
 
defaults:
  run:
    shell: powershell -ExecutionPolicy Bypass -Command ". '{0}'"
 
jobs:
  buildForWindowsBasedPlatforms:
    name: Build for StandaloneWindows64
    runs-on: [ self-hosted, Windows ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          clean: false
 
      - name: Clean Old Logs
        run: |
          $files = "unity_build.log", "error_summary.txt"
          foreach ($f in $files) { if (Test-Path $f) { Remove-Item $f -Force } }
 
      - name: Code Style Check
        run: |
          $OutputEncoding = [System.Text.Encoding]::UTF8
          Write-Host "Searching for project file..."
          $workspaceFile = Get-ChildItem -Path "$env:GITHUB_WORKSPACE" -Filter "Assembly-CSharp.csproj" -Recurse | Select-Object -First 1
          if ($null -eq $workspaceFile) {
              Write-Host "Assembly-CSharp.csproj not found. Skipping dotnet format."
              exit 0 
          }
 
          Write-Host "Found: $($workspaceFile.FullName)"
          Write-Host "Checking Code Style (Naming Conventions)..."

          # stderr も含めて全出力を文字列配列としてキャプチャ（ErrorRecord 対策）
          $formatOutput = dotnet format style "$($workspaceFile.FullName)" --severity warn --verify-no-changes --exclude "Assets\TutorialInfo" 2>&1 | ForEach-Object { "$_" }
          $formatOutput | Write-Host
          $formatExitCode = $LASTEXITCODE

          if ($formatExitCode -ne 0) {
              # 複数パターンで違反を抽出
              $violations = @()

              # パターン1: ファイル(行,列) warning IDExxx: メッセージ
              $violations += @($formatOutput |
                  Where-Object { $_ -match "warning IDE\d+" } |
                  ForEach-Object {
                      if ($_ -match "^([^:]+)\((\d+),(\d+)\):\s*warning (IDE\d+):\s*(.+)$") {
                          $file = Split-Path $Matches[1] -Leaf
                          "$file (Line $($Matches[2]), Col $($Matches[3])): [$($Matches[4])] $($Matches[5])"
                      } elseif ($_ -match "([^\\]+\.cs)\((\d+),\d+\).*?(IDE\d+):\s*(.+)$") {
                          "$($Matches[1]) (Line $($Matches[2])): [$($Matches[3])] $($Matches[4])"
                      } else {
                          $_
                      }
                  })

              # パターン2: 警告を含むすべての行
              if ($violations.Count -eq 0) {
                  $violations += @($formatOutput | Where-Object { $_ -match "warning|error" })
              }

              # 重複除去
              $violations = @($violations | Select-Object -Unique)
              $violationCount = $violations.Count

              if ($violationCount -gt 0) {
                  $displayViolations = $violations | Select-Object -First 25
                  $content = "❌ Naming Convention Violations ($violationCount found):`n`n" + ($displayViolations -join "`n")
                  if ($violationCount -gt 25) {
                      $content += "`n`n... and $($violationCount - 25) more violations (see logs)"
                  }
              } else {
                  # 万が一パースできない場合は生ログを貼る
                  $rawLines = @($formatOutput | Where-Object { $_.Length -gt 0 })
                  $content = "Naming convention violation detected (unable to parse details):`n`n" + (($rawLines | Select-Object -Last 30) -join "`n")
              }

              $content | Out-File -FilePath "error_summary.txt" -Encoding utf8
              Write-Host "`n=== VIOLATION SUMMARY ==="
              Write-Host $content
              exit 1
          }
 
      - name: Run Build
        run: |
          $assetsPath = Get-ChildItem -Path "$env:GITHUB_WORKSPACE" -Filter "Assets" -Recurse -Directory | Select-Object -First 1
          if ($null -eq $assetsPath) { Write-Error "Assets folder NOT FOUND!"; exit 1 }
          $projectRoot = $assetsPath.Parent.FullName
          $unityExe = "C:\Program Files\Unity\Hub\Editor\6000.3.1f1\Editor\Unity.exe"
          $logFile = "$env:GITHUB_WORKSPACE\unity_build.log"
 
          Get-Process -Name "Unity" -ErrorAction SilentlyContinue | Stop-Process -Force
 
          $proc = Start-Process -FilePath "$unityExe" -ArgumentList "-batchmode", "-nographics", "-quit", "-projectPath `"$projectRoot`"", "-buildTarget", "StandaloneWindows64", "-executeMethod", "BuildApp.Build", "-logFile `"$logFile`"" -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
              if (Test-Path $logFile) {
                  Get-Content $logFile -Tail 50 | Out-File -FilePath "error_summary.txt" -Encoding utf8
              } else {
                  "Unity process crashed instantly." | Out-File -FilePath "error_summary.txt" -Encoding utf8
              }
              exit 1
          }
 
      - name: Upload App
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: App_Develop
          path: "**/Builds/App/*"
          retention-days: 7
 
      - name: Discord Notification
        if: always()
        run: |
          $OutputEncoding = [System.Text.Encoding]::UTF8
 
          $status = "${{ job.status }}"
          $color = if ($status -eq "success") { 3066993 } else { 15158332 }
          $statusTag = if ($status -eq "success") { "SUCCESS" } else { "FAILURE" }
          $summaryContent = "Check GitHub Logs"
          if (Test-Path "error_summary.txt") {
              $summaryContent = (Get-Content "error_summary.txt" -Raw -Encoding utf8).Trim()
              if ($summaryContent.Length -gt 800) { $summaryContent = $summaryContent.Substring(0, 800) + "..." }
          }
          $finalSummary = '```' + "`n" + $summaryContent + "`n" + '```'
 
          $payload = @{
              embeds = @(@{
                  title = "Unity CI Monitor (PeersGame)"
                  description = "**$statusTag**"
                  color = [int]$color
                  author = @{ name = "Triggered by: ${{ github.actor }}" }
                  fields = @(
                      @{ name = "Analysis"; value = $finalSummary; inline = $false },
                      @{ name = "Details"; value = "[View Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"; inline = $false }
                  )
              })
          }
 
          $json = $payload | ConvertTo-Json -Depth 5 -Compress
          $jsonFilePath = "$env:TEMP\discord_payload.json"
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllLines($jsonFilePath, $json, $utf8NoBom)
 
          curl.exe -X POST -H "Content-Type: application/json" -d "@$jsonFilePath" "${{ secrets.DISCORD_WEBHOOK_URL }}"